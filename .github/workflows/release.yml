name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - run: npm pack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.tgz'
          generate_release_notes: true
